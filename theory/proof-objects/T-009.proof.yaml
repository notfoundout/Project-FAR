id: PO-T-009

theorem: T-009

status: draft

premises:
  - id: p1
    source: T-009 statement
    statement: "Let FAR(R) = <I, Rep, S, Int, C, T> be a finite scoped FAR representation with supplied normalization rules for ordering, labeling, and redundancy removal that are explicit, total on the representation's finite components, preserve required FAR information, and whose steps strictly decrease a finite unresolved-item measure without introducing any new unresolved item."
  - id: p2
    source: L-007
    statement: "A normalization procedure over a finite FAR representation terminates if each normalization step strictly decreases a finite unresolved-item measure for ordering, labeling, and redundancy and introduces no new unresolved item."

steps:
  - id: s1
    rule: definition_unfolding
    inputs: [p1]
    statement: "FAR(R) contains the components to be normalized: I, Rep, S, Int, C, and T."
    justification: "Unfolds the supplied FAR representation tuple in the T-009 premise."
  - id: s2
    rule: lemma_application
    inputs: [p1, p2]
    statement: "Redundancy removal, canonical labeling, structural sorting, semantic-label replacement, rule labeling, and transition rewriting terminate for finite FAR(R) under the supplied measure-decreasing no-new-unresolved-item normalization rules."
    justification: "By L-007, the supplied normalization procedure over a finite FAR representation terminates under the finite-measure and no-new-unresolved-item conditions."
  - id: s3
    rule: definition_unfolding
    inputs: [s1, s2]
    statement: "The normalization procedure constructs NF(R) by applying the supplied rules to Rep, S, Int, C, and T."
    justification: "Unfolds the normal-form construction over the finite tuple components."
  - id: s4
    rule: conjunction_intro
    inputs: [s2, s3]
    statement: "NF(R) is produced after finitely many normalization steps and preserves the required representational, structural, semantic, calculative, and trace information."
    justification: "Combines termination of each step with the stated preservation targets of the normalization procedure."
  - id: s5
    rule: universal_instantiation
    inputs: [p1, s4]
    statement: "Every finite scoped FAR representation admits a canonical normal form when supplied normalization rules for ordering, labeling, and redundancy removal are explicit, total on the representation's finite components, preserve required FAR information, and each normalization step strictly decreases a finite unresolved-item measure without introducing any new unresolved item."
    justification: "Since FAR(R) was arbitrary under the stated finiteness and rule-supply conditions, the result generalizes to every such representation."

conclusion: "Every finite scoped FAR representation admits a canonical normal form when supplied normalization rules for ordering, labeling, and redundancy removal are explicit, total on the representation's finite components, preserve required FAR information, and each normalization step strictly decreases a finite unresolved-item measure without introducing any new unresolved item."
