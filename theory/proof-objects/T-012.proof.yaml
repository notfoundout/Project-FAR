id: PO-T-012

theorem: T-012

status: draft

premises:
  - id: p1
    source: T-012 statement
    statement: "Let A and B be FAR models and let Q be a specified preservation profile."
  - id: p2
    source: FAR-model-theory
    statement: "A preservation profile Q is a finite set of selected structural, semantic, calculative, trace, and investigation-relative properties."
  - id: p3
    source: FAR-model-theory
    statement: "A and B are Q-equivalent exactly when every property in Q holds in A exactly when the corresponding property holds in B."

steps:
  - id: s1
    rule: definition_unfolding
    inputs: [p3]
    statement: "If A is Q-equivalent to B, then every property in Q is preserved between A and B."
    justification: "This is the forward direction of the definition of Q-equivalence."
  - id: s2
    rule: definition_unfolding
    inputs: [p2, p3]
    statement: "If every property in Q is preserved between A and B, then A is Q-equivalent to B."
    justification: "This is the reverse direction of the definition of preservation-profile equivalence."
  - id: s3
    rule: conjunction_intro
    inputs: [s1, s2]
    statement: "A and B are Q-equivalent if and only if every property in Q is preserved between them."
    justification: "Combines the forward and reverse definitional directions."
  - id: s4
    rule: universal_instantiation
    inputs: [p1, s3]
    statement: "Two FAR models are equivalent relative to a preservation profile Q if and only if every property in Q is preserved between them."
    justification: "Since A, B, and Q were arbitrary under the stated model-theoretic conditions, the equivalence generalizes."

conclusion: "Two FAR models are equivalent relative to a preservation profile Q if and only if every property in Q is preserved between them."
