id: PO-T-015
theorem: T-015
status: draft
premises:
- id: p1
  source: T-015 statement
  statement: Let S* be an explicit reasoning system satisfying Project FAR scope assumptions.
- id: p2
  source: T-015 scope assumptions
  statement: S* supplies or implies an objective, explicit reasoning objects, relations
    among those objects, interpretation of those objects, and rules or standards governing
    admissible transitions.
- id: p3
  source: T-003
  statement: Every reasoning process within the stated Project FAR scope admits a
    FAR representation.
- id: p4
  source: T-007
  statement: The primitive architecture is complete for constructing the objects required
    to represent any scoped explicit reasoning process.
- id: p5
  source: FAR-model-theory
  statement: A structure satisfying the FAR axioms is a FAR model.
steps:
- id: s1
  rule: definition_unfolding
  inputs:
  - p2
  statement:
    kind: claim
    claim: The objective maps to Investigation, explicit reasoning objects map to
      Representations, relations map to Representational Structure, interpretations
      map to Interpretation, and rules or standards map to Reasoning Calculus.
  justification: Unfolds the scope-assumption mapping from an explicit reasoning system
    to FAR primitive roles.
- id: s2
  rule: prior_theorem
  inputs:
  - p1
  - p3
  statement:
    kind: claim
    claim: The reasoning process generated by S* admits a FAR representation.
  justification: Applies the Representation Theorem to the explicit reasoning process
    satisfying FAR scope assumptions.
- id: s3
  rule: prior_theorem
  inputs:
  - p4
  - s1
  statement:
    kind: claim
    claim: The mapped components of S* are constructible from the FAR primitive architecture.
  justification: By primitive completeness, the required representational objects
    are constructible from the primitive architecture.
- id: s4
  rule: conjunction_intro
  inputs:
  - s2
  - s3
  statement:
    kind: claim
    claim: S* supplies a FAR-representable structure with the required primitive roles.
  justification: Combines representability with primitive-role construction.
- id: s5
  rule: definition_unfolding
  inputs:
  - p5
  - s4
  statement:
    kind: claim
    claim: S* is representable as a FAR model.
  justification: By FAR model theory, a structure satisfying the FAR axioms is a FAR
    model; S* supplies the required mapped structure.
- id: s6
  rule: universal_instantiation
  inputs:
  - p1
  - s5
  statement:
    kind: universal
    claim: Every explicit reasoning system satisfying Project FAR scope assumptions
      is representable as a FAR model.
  justification: Since S* was arbitrary under the stated scope assumptions, the result
    generalizes.
conclusion: Every explicit reasoning system satisfying Project FAR scope assumptions
  is representable as a FAR model.
