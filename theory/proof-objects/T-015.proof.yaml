id: PO-T-015

theorem: T-015

status: accepted

premises:
  - id: p1
    source: T-015 statement
    statement: "Let S* be an explicit reasoning system satisfying Project FAR scope assumptions."
  - id: p2
    source: T-015 scope assumptions
    statement: "S* supplies or implies an objective, explicit reasoning objects, relations among those objects, interpretation of those objects, and rules or standards governing admissible transitions."
  - id: p3
    source: T-003
    statement: "Every reasoning process within the stated Project FAR scope admits a FAR representation."
  - id: p4
    source: FAR-model-theory
    statement: "A structure satisfying the FAR axioms is a FAR model."

steps:
  - id: s1
    rule: definition_unfolding
    inputs: [p2]
    statement: "The objective maps to Investigation, explicit reasoning objects map to Representations, relations map to Representational Structure, interpretations map to Interpretation, and rules or standards map to Reasoning Calculus."
    justification: "Unfolds the scope-assumption mapping from an explicit reasoning system to FAR primitive roles."
  - id: s2
    rule: prior_theorem
    inputs: [p1, p3]
    statement: "The reasoning process generated by S* admits a FAR representation."
    justification: "Applies the Representation Theorem to the explicit reasoning process satisfying FAR scope assumptions."
  - id: s3
    rule: conjunction_intro
    inputs: [s1, s2]
    statement: "S* supplies a FAR-representable structure with the required primitive roles."
    justification: "Combines the scope-assumption mapping with the FAR representation supplied by T-003."
  - id: s4
    rule: definition_unfolding
    inputs: [p4, s3]
    statement: "S* is representable as a FAR model."
    justification: "By FAR model theory, a structure satisfying the FAR axioms is a FAR model; S* supplies the required mapped structure."
  - id: s5
    rule: universal_instantiation
    inputs: [p1, s4]
    statement: "Every explicit reasoning system satisfying Project FAR scope assumptions is representable as a FAR model."
    justification: "Since S* was arbitrary under the stated scope assumptions, the result generalizes."

conclusion: "Every explicit reasoning system satisfying Project FAR scope assumptions is representable as a FAR model."
