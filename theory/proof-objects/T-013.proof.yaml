id: PO-T-013

theorem: T-013

status: accepted

premises:
  - id: p1
    source: T-013 statement
    statement: "Let F be a FAR representation with reasoning calculus C."
  - id: p2
    source: T-013 marking rule
    statement: "F marks a transition t admissible only if C permits t."
  - id: p3
    source: DEF-046
    statement: "A reasoning calculus governs admissible reasoning transitions."
  - id: p4
    source: D-006
    statement: "Admissibility is satisfaction of criteria supplied by a Reasoning Calculus within an Investigation."

steps:
  - id: s1
    rule: definition_unfolding
    inputs: [p1, p3]
    statement: "C is the supplied target calculus governing admissibility for F."
    justification: "Unfolds the role of the reasoning calculus in the FAR representation."
  - id: s2
    rule: definition_unfolding
    inputs: [p2]
    statement: "For any transition t, if F marks t admissible, then C permits t."
    justification: "This is the admissibility marking rule stated for F."
  - id: s3
    rule: definition_unfolding
    inputs: [p4, s2]
    statement: "If C permits t, then t satisfies the admissibility criteria supplied by C."
    justification: "Unfolds admissibility relative to a reasoning calculus."
  - id: s4
    rule: universal_instantiation
    inputs: [s2, s3]
    statement: "Every transition marked admissible in F is admissible under C."
    justification: "For arbitrary t, F marking t admissible implies C permits t, which is admissibility under C."
  - id: s5
    rule: definition_unfolding
    inputs: [s1, s4]
    statement: "F is sound relative to C."
    justification: "A FAR representation is sound relative to C when every transition it marks admissible is admissible under C."

conclusion: "F is sound relative to C."
