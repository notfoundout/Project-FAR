tests:
- id: ADV-001
  title: Higher-order Logic
  reasoning_system: Higher-order Logic
  hypothesis: Higher-order quantification may require representation of predicates
    over predicates without adding primitives.
  primitive_under_pressure: Representation
  expected_outcome: classification under adversarial primitive-sufficiency standard
  observed_outcome: Representation directly admits predicates and predicate-level
    objects as represented content; higher-order typing is structural detail rather
    than a new primitive.
  current_status: resolved by existing primitive
  confidence: high
  notes: 'Canonical analysis: resolved by existing primitive. Remaining open question:
    Track whether impredicative encodings require repository-specific derived constraints.'
- id: ADV-002
  title: Reflective Reasoning
  reasoning_system: Reflective Reasoning
  hypothesis: Reasoning about a reasoning process may stress interpretation and self-reference
    handling.
  primitive_under_pressure: Interpretation
  expected_outcome: classification under adversarial primitive-sufficiency standard
  observed_outcome: Reflective reasoning is representable as an interpreted object-level
    reasoning trace, but sound handling of self-reference requires a reflection policy.
  current_status: conservative extension
  confidence: medium
  notes: 'Canonical analysis: conservative extension. Remaining open question: Specify
    reflection policy boundaries for circular or self-endorsing interpretations.'
- id: ADV-003
  title: Self-Modifying Reasoning
  reasoning_system: Self-Modifying Reasoning
  hypothesis: Reasoning that changes its own rules may stress reasoning-calculus representation.
  primitive_under_pressure: Reasoning Calculus
  expected_outcome: classification under adversarial primitive-sufficiency standard
  observed_outcome: Rule mutation can be represented as transitions between calculi,
    but the repository lacks enough machinery for self-directed calculus replacement
    and stability criteria.
  current_status: unresolved pressure
  confidence: medium
  notes: 'Canonical analysis: unresolved pressure. Remaining open question: Determine
    whether self-modifying calculi need only transition policies or expose deeper
    primitive pressure.'
- id: ADV-004
  title: Probabilistic Programming
  reasoning_system: Probabilistic Programming
  hypothesis: Programs with probabilistic inference may stress representation of stochastic
    dependencies and execution traces.
  primitive_under_pressure: Representational Structure
  expected_outcome: classification under adversarial primitive-sufficiency standard
  observed_outcome: Stochastic traces and dependencies fit representational structures,
    while probability kernels and conditioning rules are domain-specific extensions.
  current_status: conservative extension
  confidence: high
  notes: 'Canonical analysis: conservative extension. Remaining open question: Formalize
    probabilistic trace structures and inference-policy constraints if promoted.'
- id: ADV-005
  title: Belief Revision
  reasoning_system: Belief Revision
  hypothesis: Revision under new information may stress transitions between representations
