investigation: Test whether First-order logic maps into FAR primitives.

reasoning_system:
  system: First-order logic
  far_primitives:
    Investigation: Determine whether a First-order logic episode has explicit FAR structure.
    Representation: quantified formulas
    Representational Structure: support and dependency relations among represented items
    Interpretation: model and assignment semantics
    Reasoning Calculus: first-order inference rules
  verdict: fits FAR

representations:
  - id: r1
    kind: premise
    content: Initial First-order logic input.
    statement:
      kind: claim
      subject: First-order logic input
      predicate: maps to representation
      scope: Project FAR fixture
      claim: The initial First-order logic input maps to a FAR representation.
  - id: r2
    kind: conclusion
    content: Candidate First-order logic output.
    statement:
      kind: claim
      subject: First-order logic output
      predicate: follows by fixture standard
      scope: Project FAR fixture
      claim: The candidate First-order logic output follows by the fixture inference standard.

relations:
  - id: rel1
    type: supports
    source: r1
    target: r2

interpretations:
  - representation: r1
    meaning: model and assignment semantics
  - representation: r2
    meaning: Output interpreted under First-order logic standards.

rules:
  - id: rule1
    name: fixture inference standard
    inputs: [r1]
    output: r2
    condition: Apply first-order inference rules.

transitions:
  - id: t1
    source: state0
    rule: rule1
    target: state1
    status: draft
    order: 1
