investigation: Test whether Analogical reasoning maps into FAR primitives.

reasoning_system:
  system: Analogical reasoning
  far_primitives:
    Investigation: Determine whether a Analogical reasoning episode has explicit FAR structure.
    Representation: source and target cases
    Representational Structure: support and dependency relations among represented items
    Interpretation: similarity interpretation
    Reasoning Calculus: analogy transfer standards
  verdict: fits FAR

representations:
  - id: r1
    kind: premise
    content: Initial Analogical reasoning input.
    statement:
      kind: claim
      subject: Analogical reasoning input
      predicate: maps to representation
      scope: Project FAR fixture
      claim: The initial Analogical reasoning input maps to a FAR representation.
  - id: r2
    kind: conclusion
    content: Candidate Analogical reasoning output.
    statement:
      kind: claim
      subject: Analogical reasoning output
      predicate: follows by fixture standard
      scope: Project FAR fixture
      claim: The candidate Analogical reasoning output follows by the fixture inference standard.

relations:
  - id: rel1
    type: supports
    source: r1
    target: r2

interpretations:
  - representation: r1
    meaning: similarity interpretation
  - representation: r2
    meaning: Output interpreted under Analogical reasoning standards.

rules:
  - id: rule1
    name: fixture inference standard
    inputs: [r1]
    output: r2
    condition: Apply analogy transfer standards.

transitions:
  - id: t1
    source: state0
    rule: rule1
    target: state1
    status: draft
    order: 1
