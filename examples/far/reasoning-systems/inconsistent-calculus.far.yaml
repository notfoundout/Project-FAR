investigation: Test whether inconsistent calculi strain FAR primitives.

reasoning_system:
  system: Inconsistent calculus
  far_primitives:
    Investigation: Determine whether reasoning can proceed when the calculus admits both a claim and its negation.
    Representation: inconsistent premises, contradiction relation, and non-explosive conclusion policy
    Representational Structure: contradiction, support, and containment relations
    Interpretation: inconsistency-tolerant interpretation
    Reasoning Calculus: paraconsistent or inconsistency-tolerant inference standards
  verdict: falsifies FAR

representations:
  - id: positive
    kind: premise
    content: A
    statement:
      kind: claim
      subject: A
      predicate: is asserted
      scope: inconsistent calculus fixture
      claim: A is asserted.
  - id: negative
    kind: premise
    content: not A
    statement:
      kind: claim
      subject: not A
      predicate: is asserted
      scope: inconsistent calculus fixture
      claim: Not A is asserted.
  - id: policy
    kind: constraint
    content: Explosion is not automatically permitted.
    statement:
      kind: claim
      subject: inference policy
      predicate: blocks automatic explosion
      scope: inconsistent calculus fixture
      claim: The inference policy blocks automatic explosion from contradiction.
  - id: assessment
    kind: conclusion
    content: The system is a candidate counterexample unless FAR can represent non-explosive inconsistency as calculus policy.
    statement:
      kind: claim
      subject: inconsistent calculus
      predicate: is a candidate counterexample
      scope: inconsistent calculus fixture
      claim: The inconsistent calculus is a candidate counterexample for FAR.

relations:
  - id: rel1
    type: contradicts
    source: positive
    target: negative
  - id: rel2
    type: supports
    source: policy
    target: assessment
  - id: rel3
    type: supports
    source: positive
    target: assessment
  - id: rel4
    type: supports
    source: negative
    target: assessment

interpretations:
  - representation: positive
    meaning: A positive assertion in an inconsistent premise set.
  - representation: negative
    meaning: A negated assertion in the same premise set.
  - representation: policy
    meaning: A calculus-level restriction on explosion.
  - representation: assessment
    meaning: A candidate counterexample pending a full FAR account of inconsistent calculi.

rules:
  - id: inconsistency-test
    name: non-explosive inconsistency test
    inputs: [positive, negative, policy]
    output: assessment
    condition: Evaluate whether contradiction requires a new primitive or only a calculus policy.

transitions:
  - id: t1
    source: state0
    rule: inconsistency-test
    target: state1
    status: draft
    order: 1
