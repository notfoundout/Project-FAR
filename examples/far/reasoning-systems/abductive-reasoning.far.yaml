investigation: Test whether Abductive reasoning maps into FAR primitives.

reasoning_system:
  system: Abductive reasoning
  far_primitives:
    Investigation: Determine whether a Abductive reasoning episode has explicit FAR structure.
    Representation: observations and hypotheses
    Representational Structure: support and dependency relations among represented items
    Interpretation: explanatory interpretation
    Reasoning Calculus: best-explanation standards
  verdict: fits FAR

representations:
  - id: r1
    kind: premise
    content: Initial Abductive reasoning input.
    statement:
      kind: claim
      subject: Abductive reasoning input
      predicate: maps to representation
      scope: Project FAR fixture
      claim: The initial Abductive reasoning input maps to a FAR representation.
  - id: r2
    kind: conclusion
    content: Candidate Abductive reasoning output.
    statement:
      kind: claim
      subject: Abductive reasoning output
      predicate: follows by fixture standard
      scope: Project FAR fixture
      claim: The candidate Abductive reasoning output follows by the fixture inference standard.

relations:
  - id: rel1
    type: supports
    source: r1
    target: r2

interpretations:
  - representation: r1
    meaning: explanatory interpretation
  - representation: r2
    meaning: Output interpreted under Abductive reasoning standards.

rules:
  - id: rule1
    name: fixture inference standard
    inputs: [r1]
    output: r2
    condition: Apply best-explanation standards.

transitions:
  - id: t1
    source: state0
    rule: rule1
    target: state1
    status: draft
    order: 1
