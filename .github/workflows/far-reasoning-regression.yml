name: FAR Reasoning Regression

on:
  pull_request:
    paths:
      - "commercial/far-decision-integrity/**"
      - ".github/workflows/far-reasoning-regression.yml"
  push:
    branches:
      - "commercial/**"
    paths:
      - "commercial/far-decision-integrity/**"
      - ".github/workflows/far-reasoning-regression.yml"

permissions:
  contents: read

jobs:
  regression-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install FAR decision integrity
        run: python -m pip install --disable-pip-version-check ./commercial/far-decision-integrity
      - name: Run reasoning regression tests
        run: python -m unittest discover -s commercial/far-decision-integrity/tests -p "test_*.py" -v
