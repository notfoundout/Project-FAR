name: Verify Theory

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-theory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify theory metadata and proofs
        run: python tools/verify_theory.py

      - name: Check dependencies
        run: python tools/check_dependencies.py

      - name: Check registry
        run: python tools/check_registry.py

      - name: Check notation
        run: python tools/check_notation.py

      - name: Check circularity
        run: python tools/check_circularity.py

      - name: Check internal links
        run: python tools/check_internal_links.py

      - name: Generate theorem index smoke test
        run: python tools/generate_theorem_index.py

      - name: Parse FAR YAML examples
        run: |
          find examples/far -name '*.far.yaml' -print | sort | while read -r example; do
            python tools/parse_far.py "$example"
          done

      - name: Run FAR reasoning engine examples
        run: |
          find examples/far -name '*.far.yaml' -print | sort | while read -r example; do
            python tools/reasoning_engine.py "$example"
            python tools/reasoning_engine.py --json "$example" >/tmp/far-proof-trace.json
          done

      - name: Evaluate reasoning-system fixtures
        run: |
          python tools/evaluate_reasoning_systems.py
          python tools/evaluate_reasoning_systems.py --json >/tmp/far-reasoning-system-results.json

      - name: Evaluate primitive sufficiency
        run: python tools/evaluate_primitive_sufficiency.py

      - name: Check all proof objects
        run: |
          for proof in theory/proof-objects/T-*.proof.yaml; do
            python tools/check_proof_object.py "$proof"
          done
