name: Verify Theory

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-theory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify theory metadata and proofs
        run: python tools/verify_theory.py

      - name: Check dependencies
        run: python tools/check_dependencies.py

      - name: Check registry
        run: python tools/check_registry.py

      - name: Check notation
        run: python tools/check_notation.py

      - name: Check circularity
        run: python tools/check_circularity.py

      - name: Generate theorem index smoke test
        run: python tools/generate_theorem_index.py

      - name: Parse FAR YAML example
        run: python tools/parse_far.py examples/far/syllogism.far.yaml

      - name: Run FAR reasoning engine example
        run: python tools/reasoning_engine.py examples/far/syllogism.far.yaml

      - name: Check all proof objects
        run: |
          for proof in theory/proof-objects/T-*.proof.yaml; do
            python tools/check_proof_object.py "$proof"
          done
