name: Project FAR 1.0 Exact Release Candidate

on:
  pull_request:
    paths:
      - "commercial/far-decision-integrity/**"
      - "docs/releases/1.0*"
      - "tools/validate_exact_1_0_candidate.py"
      - ".github/workflows/1-0-exact-release-candidate.yml"
  workflow_dispatch:

jobs:
  exact-release-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate exact candidate metadata and boundaries
        run: python tools/validate_exact_1_0_candidate.py | tee exact-candidate.json
      - name: Build canonical distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build commercial/far-decision-integrity --outdir "$RUNNER_TEMP/dist"
      - name: Verify built version and fresh installation
        run: |
          python -m venv "$RUNNER_TEMP/far-release-venv"
          "$RUNNER_TEMP/far-release-venv/bin/python" -m pip install "$RUNNER_TEMP"/dist/*.whl
          "$RUNNER_TEMP/far-release-venv/bin/python" - <<'PY'
          from importlib.metadata import version
          assert version("far-decision-integrity") == "1.0.0"
          PY
          "$RUNNER_TEMP/far-release-venv/bin/far-decision" --help
          "$RUNNER_TEMP/far-release-venv/bin/far-reasoning-regression" --help
          "$RUNNER_TEMP/far-release-venv/bin/far-external-trace" --help
      - name: Run package and release tests
        run: |
          python -m unittest discover -s commercial/far-decision-integrity/tests -p "test_*.py"
          python -m unittest tests.test_release_1_0_readiness
      - name: Bind evidence to exact commit and tree
        run: |
          mkdir -p "$RUNNER_TEMP/release-candidate"
          cp exact-candidate.json "$RUNNER_TEMP/release-candidate/"
          cd "$RUNNER_TEMP/dist"
          sha256sum * | sort > "$RUNNER_TEMP/release-candidate/distribution-sha256.txt"
          git -C "$GITHUB_WORKSPACE" rev-parse HEAD > "$RUNNER_TEMP/release-candidate/commit.txt"
          git -C "$GITHUB_WORKSPACE" rev-parse 'HEAD^{tree}' > "$RUNNER_TEMP/release-candidate/tree.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: project-far-1-0-exact-release-candidate
          path: ${{ runner.temp }}/release-candidate
          if-no-files-found: error
