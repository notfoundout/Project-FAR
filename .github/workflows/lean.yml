name: Lean Mechanization

on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lean-t003:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | \
            sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Compile FARCore
        run: lean mechanization/lean/FARCore.lean
      - name: Compile bounded W5 theorem
        run: lean mechanization/lean/SCoreW5.lean
      - name: Compile G1 end-to-end semantic kernel
        run: lean mechanization/lean/UPPSemanticKernel.lean
      - name: Compile G2 open-world lower-bound theorem
        run: lean mechanization/lean/G2OpenWorldLowerBound.lean
      - name: Compile G3 epistemic maximality theorem
        run: lean mechanization/lean/G3EpistemicMaximality.lean
      - name: Compile canonicality
        run: lean mechanization/lean/Canonicality.lean
      - name: Compile representation invariance
        run: lean mechanization/lean/RepresentationInvariance.lean
      - name: Compile quotient minimality
        run: lean mechanization/lean/QuotientMinimality.lean
      - name: Compile definitional completeness
        run: lean mechanization/lean/DefinitionalCompleteness.lean
      - name: Compile conservative extensibility
        run: lean mechanization/lean/ConservativeExtensibility.lean
      - name: Compile maximal knowability
        run: lean mechanization/lean/MaximalKnowability.lean
      - name: Compile canonical universality terminal theorem
        run: lean mechanization/lean/CanonicalUniversalityTerminal.lean
      - name: Compile validation-engine assurance model
        id: assurance_lean
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          lean mechanization/lean/ValidationEngine.lean 2>&1 | tee artifacts/validation/lean/validation-engine-lean.log
      - name: Print validation-engine Lean failure
        if: always() && steps.assurance_lean.outcome == 'failure'
        run: tail -n 160 artifacts/validation/lean/validation-engine-lean.log
      - name: Upload validation-engine Lean failure
        if: always() && steps.assurance_lean.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: validation-engine-lean-failure
          path: artifacts/validation/lean/validation-engine-lean.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce validation-engine Lean result
        if: always() && steps.assurance_lean.outcome == 'failure'
        run: exit 1
      - name: Check T-003 alignment
        run: python -m unittest tests.test_t003_lean_alignment
      - name: Check bounded W5 alignment
        run: python -m unittest tests.test_s_core_w5_lean_alignment
      - name: Check G1 semantic-kernel alignment
        run: python -m unittest tests.test_upp_semantic_kernel_alignment
      - name: Check G2 open-world lower-bound alignment
        run: python -m unittest tests.test_g2_open_world_lower_bound_alignment
      - name: Check G3 epistemic maximality alignment
        run: python -m unittest tests.test_g3_epistemic_maximality_alignment
      - name: Check canonical universality alignment
        run: python -m unittest tests.test_canonical_universality_alignment
