name: Lean Mechanization

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lean-t003:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | \
            sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Compile FARCore
        run: lean -o mechanization/lean/FARCore.olean mechanization/lean/FARCore.lean
      - name: Compile independent process semantics
        run: LEAN_PATH=. lean mechanization/lean/ProcessSemantics.lean
      - name: Check T-003 alignment and process semantics
        run: python -m unittest tests.test_t003_lean_alignment tests.test_process_semantics >process-semantics-tests.log 2>&1
      - name: Upload process semantics test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: process-semantics-test-output
          path: process-semantics-tests.log
          if-no-files-found: warn
