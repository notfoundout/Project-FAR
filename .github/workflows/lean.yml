name: Lean Mechanization

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lean-t003:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | \
            sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Compile FARCore
        shell: bash
        run: lean mechanization/lean/FARCore.lean >lean-output.log 2>&1
      - name: Check T-003 alignment
        run: python -m unittest tests.test_t003_lean_alignment
      - name: Run fast repository health diagnostic
        shell: bash
        run: |
          python -m pip install pyyaml
          python tools/repo_health_check.py --fast >fast-health.log 2>&1
      - name: Upload Lean and health diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-t003-diagnostics
          path: |
            lean-output.log
            fast-health.log
          if-no-files-found: warn
