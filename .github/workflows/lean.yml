name: Lean Mechanization

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lean-t003:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | \
            sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Compile FARCore
        shell: bash
        run: |
          set -o pipefail
          if ! lean mechanization/lean/FARCore.lean >lean-output.log 2>&1; then
            echo "LEAN COMPILATION FAILED"
            tail -n 60 lean-output.log
            exit 1
          fi
          cat lean-output.log
      - name: Check T-003 alignment
        run: python -m unittest tests.test_t003_lean_alignment
