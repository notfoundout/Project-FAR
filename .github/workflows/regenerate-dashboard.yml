name: Regenerate Command Center
on:
  workflow_dispatch: null
permissions:
  contents: write
  pull-requests: write
jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}
    - uses: actions/setup-python@v5
      with:
        python-version: 3.x
    - name: Install dependencies
      run: python -m pip install pyyaml
    - name: Regenerate dashboard
      run: 'start=$(date +%s)

        make dashboard

        end=$(date +%s)

        echo "execution_time_seconds=$((end-start))" >> "$GITHUB_STEP_SUMMARY"

        '
    - name: Commit and push generated artifacts
      id: commit
      run: "git config user.name \"github-actions[bot]\"\ngit config user.email \"\
        41898282+github-actions[bot]@users.noreply.github.com\"\nchanged=$(git status\
        \ --porcelain)\necho \"## Regenerated Files\" >> \"$GITHUB_STEP_SUMMARY\"\n\
        if [ -z \"$changed\" ]; then\n  echo \"No regenerated files changed.\" >>\
        \ \"$GITHUB_STEP_SUMMARY\"\n  echo \"changed=false\" >> \"$GITHUB_OUTPUT\"\
        \n  exit 0\nfi\ngit status --short >> \"$GITHUB_STEP_SUMMARY\"\ngit add README.md\
        \ docs/planning docs/reports/project-status-generated.md docs/reports/research-gap-report.md\
        \ docs/reports/dependency-report.md docs/reports/dependency-graph.json docs/reports/dependency-graph.mmd\n\
        git commit -m \"Regenerate Project FAR dashboard artifacts\"\ngit push ||\
        \ echo \"push_failed=true\" >> \"$GITHUB_OUTPUT\"\necho \"changed=true\" >>\
        \ \"$GITHUB_OUTPUT\"\n"
    - name: Open fallback PR
      if: steps.commit.outputs.push_failed == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        title: Regenerate Project FAR dashboard artifacts
        body: Automated dashboard regeneration containing only generated artifacts.
        branch: automation/regenerate-dashboard
    timeout-minutes: 30
