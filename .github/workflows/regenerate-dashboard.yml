name: Regenerate Command Center

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: python -m pip install pyyaml
      - name: Regenerate dashboard
        run: |
          start=$(date +%s)
          make dashboard
          end=$(date +%s)
          echo "execution_time_seconds=$((end-start))" >> "$GITHUB_STEP_SUMMARY"
      - name: Commit and push generated artifacts
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          changed=$(git status --porcelain)
          echo "## Regenerated Files" >> "$GITHUB_STEP_SUMMARY"
          if [ -z "$changed" ]; then
            echo "No regenerated files changed." >> "$GITHUB_STEP_SUMMARY"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git status --short >> "$GITHUB_STEP_SUMMARY"
          git add README.md docs/planning docs/reports/project-status-generated.md docs/reports/research-gap-report.md
          git commit -m "Regenerate Project FAR dashboard artifacts"
          git push || echo "push_failed=true" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Open fallback PR
        if: steps.commit.outputs.push_failed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          title: Regenerate Project FAR dashboard artifacts
          body: Automated dashboard regeneration containing only generated artifacts.
          branch: automation/regenerate-dashboard
