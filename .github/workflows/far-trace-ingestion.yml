name: FAR Trace Ingestion

on:
  pull_request:
    paths:
      - "commercial/far-decision-integrity/**"
      - ".github/workflows/far-trace-ingestion.yml"

permissions:
  contents: read

jobs:
  trace-ingestion:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install FAR decision integrity
        run: python -m pip install --disable-pip-version-check ./commercial/far-decision-integrity
      - name: Run decision integrity tests
        run: python -m unittest discover -s commercial/far-decision-integrity/tests -p "test_*.py" -v
      - name: Verify installed trace ingestion
        shell: bash
        run: |
          mkdir -p far-evidence/trace-ingestion
          cat > far-evidence/trace-ingestion/trace.json <<'JSON'
          {"spans":[{"trace_id":"trace-ci","span_id":"root","attributes":{"far.decision.root_span":true,"far.decision.id":"ci-decision","far.decision.type":"issue_refund","far.policy.version":"refund-policy/2026-07","far.decision.root":"approve-refund","far.action.kind":"financial_action","far.action.target":"order-ci","far.trace.completeness":1.0}},{"trace_id":"trace-ci","span_id":"evidence","attributes":{"far.node.id":"payment-confirmed","far.node.kind":"evidence","far.node.statement":"Payment is confirmed.","far.dependency.target":"approve-refund","far.dependency.relation":"supports","far.authorization.required":true}},{"trace_id":"trace-ci","span_id":"decision","attributes":{"far.node.id":"approve-refund","far.node.kind":"conclusion","far.node.statement":"Approve refund."}}]}
          JSON
          far-trace-ingest far-evidence/trace-ingestion/trace.json --output far-evidence/trace-ingestion/decision-package.json
          python -c 'import json; p=json.load(open("far-evidence/trace-ingestion/decision-package.json")); assert p["decision_id"] == "ci-decision"'
      - name: Upload normalized package
        uses: actions/upload-artifact@v4
        with:
          name: far-trace-ingestion
          path: far-evidence/trace-ingestion
          if-no-files-found: error
          retention-days: 7
