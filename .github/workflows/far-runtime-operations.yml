name: FAR Runtime Operations

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-operations:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install ./commercial/far-decision-integrity
      - name: Run runtime operations tests
        run: python -m unittest discover -s commercial/far-decision-integrity/tests -p "test_*.py"
      - name: Verify installed secured runtime flags
        run: far-secured-service --help | grep -- "--rate-limit"
      - name: Stage runtime operations evidence
        run: |
          mkdir -p far-evidence/runtime-operations
          python - <<'PY'
          import json
          from pathlib import Path
          Path("far-evidence/runtime-operations/result.json").write_text(
              json.dumps({"schema_version": "far-runtime-operations-integration/0.1", "status": "passed"}, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Upload runtime operations evidence
        uses: actions/upload-artifact@v4
        with:
          name: far-runtime-operations-evidence
          path: far-evidence/runtime-operations
