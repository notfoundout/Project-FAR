name: FAR Decision Integrity Core

on:
  pull_request:
    paths:
      - "commercial/far-decision-integrity/**"
      - ".github/workflows/far-decision-integrity-core.yml"
  push:
    branches: [main]
    paths:
      - "commercial/far-decision-integrity/**"
      - ".github/workflows/far-decision-integrity-core.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install ./commercial/far-decision-integrity
      - name: Run tests
        run: python -m unittest discover -s commercial/far-decision-integrity/tests -p "test_*.py"
      - name: Verify installed command
        run: far-decision --help
