name: Repair PR 232 Trace Contract

on:
  push:
    branches: [agent/validator-assurance-hardening]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/validator-assurance-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Repair trace contract and regression coverage
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path('.')
          tracing_path = root / 'far_validation/tracing.py'
          tracing = tracing_path.read_text(encoding='utf-8')

          old_normalize = '''    if not candidate.is_absolute():
        candidate = cwd / candidate
    return _inside(candidate, root)
'''
          new_normalize = '''    if not candidate.is_absolute():
        candidate = cwd / candidate
    relative = _inside(candidate, root)
    return None if relative in {None, "."} else relative
'''
          if old_normalize not in tracing:
              raise SystemExit('normalize target not found')
          tracing = tracing.replace(old_normalize, new_normalize, 1)

          old_matches = '''    for pattern in patterns:
        if fnmatch.fnmatch(normalized, pattern) or Path(normalized).match(pattern):
            return True
        if pattern.endswith("/**"):
            prefix = pattern[:-3].rstrip("/")
            if normalized == prefix or normalized.startswith(prefix + "/"):
                return True
'''
          new_matches = '''    for pattern in patterns:
        variants = {pattern}
        collapsed = pattern
        while "/**/" in collapsed:
            collapsed = collapsed.replace("/**/", "/", 1)
            variants.add(collapsed)
        if any(
            fnmatch.fnmatch(normalized, candidate) or Path(normalized).match(candidate)
            for candidate in variants
        ):
            return True
        if pattern.endswith("/**"):
            prefix = pattern[:-3].rstrip("/")
            if normalized == prefix or normalized.startswith(prefix + "/"):
                return True
'''
          if old_matches not in tracing:
              raise SystemExit('matches target not found')
          tracing_path.write_text(tracing.replace(old_matches, new_matches, 1), encoding='utf-8')

          lock_path = root / 'validation_bootstrap/assurance-lock.json'
          lock = json.loads(lock_path.read_text(encoding='utf-8'))
          manifest_path = root / 'validation/manifest.json'
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          bootstrap = next(item for item in manifest['checks'] if item['id'] == 'bootstrap.manifest')
          bootstrap['inputs'] = list(dict.fromkeys(
              list(bootstrap.get('inputs', [])) + sorted(lock['files'])
          ))
          manifest_path.write_text(
              json.dumps(manifest, sort_keys=False, separators=(',', ':')),
              encoding='utf-8',
          )

          tests_path = root / 'tests/test_validation_assurance.py'
          tests = tests_path.read_text(encoding='utf-8')
          tests = tests.replace(
              'from far_validation.tracing import RuntimePolicy, audit_trace, parse_strace\n',
              'from far_validation.tracing import (\n'
              '    RuntimePolicy, _matches, _normalize_observed, audit_trace, parse_strace,\n'
              ')\n',
              1,
          )
          marker = '\n\nclass IndependentOracleTests(unittest.TestCase):\n'
          addition = '''

    def test_root_metadata_is_ignored_and_zero_depth_globs_match(self) -> None:
        with tempfile.TemporaryDirectory() as directory:
            root = Path(directory)
            self.assertIsNone(_normalize_observed(str(root), root, root))
        self.assertTrue(_matches("tools/check_one.py", ("tools/**/*.py",)))
        self.assertTrue(_matches("mechanization/model.py", ("mechanization/**/*.py",)))
'''
          if marker not in tests:
              raise SystemExit('test insertion marker not found')
          tests_path.write_text(tests.replace(marker, addition + marker, 1), encoding='utf-8')

          for raw in ('far_validation/tracing.py', 'tests/test_validation_assurance.py'):
              lock['files'][raw] = hashlib.sha256((root / raw).read_bytes()).hexdigest()
          lock_path.write_text(json.dumps(lock, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
      - name: Verify repaired assurance layer
        run: |
          python validation_bootstrap/verify.py
          python -m unittest discover -s tests -p 'test_validation_assurance.py' -v
          python -m compileall -q far_validation validation_bootstrap tools tests
      - name: Commit repair
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add validation/manifest.json far_validation/tracing.py tests/test_validation_assurance.py validation_bootstrap/assurance-lock.json
          git commit -m 'Repair traced bootstrap dependency contract'
          git push origin HEAD:agent/validator-assurance-hardening
