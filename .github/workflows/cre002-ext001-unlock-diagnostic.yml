name: CRE-002-EXT-001 Unlock Diagnostic
on:
  pull_request:
    branches:
      - main
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run fast health
        id: health
        shell: bash
        run: |
          set +e
          python tools/repo_health_check.py --fast > health.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload health diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cre002-ext001-unlock-health
          path: health.log
      - name: Fail if health failed
        shell: bash
        run: exit "${{ steps.health.outputs.exit_code }}"
