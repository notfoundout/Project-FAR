name: W4 Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run complete diagnostic matrix
        shell: bash
        run: |
          set +e
          set -u
          mkdir -p diagnostic-logs
          : > diagnostic-logs/summary.txt
          failed=0

          run_check() {
            name="$1"
            shift
            echo "== $name =="
            "$@" > "diagnostic-logs/${name}.log" 2>&1
            status=$?
            echo "$name=$status" | tee -a diagnostic-logs/summary.txt
            if [ "$status" -ne 0 ]; then
              failed=1
              echo "--- failure tail: $name ---"
              tail -n 100 "diagnostic-logs/${name}.log"
            fi
          }

          run_check canonical-tests python tools/run_tests.py --fast
          run_check research-gates python tools/check_research_gates.py
          run_check deduction-program python tools/check_deduction_first_program.py
          run_check theorem-target python tools/check_thm_target_001.py
          run_check faithful-representation python tools/check_faithful_representation.py
          run_check p8-role python tools/check_p8_theorem_role.py
          run_check s-core-ledger python tools/check_s_core_lemma_ledger.py
          run_check w0-retained python tools/check_s_core_w0.py
          run_check w1-retained python tools/check_s_core_w1.py
          run_check w2-retained python tools/check_s_core_w2.py
          run_check w3-retained python tools/check_s_core_w3.py
          run_check w4-package python tools/check_s_core_w4.py
          run_check rep-adj-usd-separation python tools/check_representation_discovery_separation.py
          run_check repository-hygiene python tools/check_repository_hygiene.py
          run_check markdown-hygiene python tools/check_markdown_hygiene.py
          run_check internal-links python tools/check_internal_links.py
          run_check generator-next-actions python tools/generate_next_tasks.py
          run_check generator-status python tools/project_status_report.py
          run_check generator-dashboard python tools/update_readme_dashboard.py
          run_check generator-drift git diff --exit-code

          echo "$failed" > diagnostic-logs/failed
          cat diagnostic-logs/summary.txt
          exit 0
      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: w4-diagnostic-logs
          path: diagnostic-logs
          if-no-files-found: error
          retention-days: 2
      - name: Fail on diagnostic defects
        run: |
          cat diagnostic-logs/summary.txt
          test "$(cat diagnostic-logs/failed)" = "0"
