name: Project Planning
on:
  workflow_dispatch: null
jobs:
  project-planning:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: 3.x
    - run: pip install -r requirements.txt
    - run: python tools/self_advancement_plan.py
    timeout-minutes: 30
