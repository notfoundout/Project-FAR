name: FAR Hosted Demo

on:
  pull_request:
    paths:
      - "commercial/far-demo/**"
      - "commercial/far-decision-integrity/**"
      - ".github/workflows/far-demo.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e commercial/far-decision-integrity
          python -m pip install -e commercial/far-demo
      - name: Run demo tests
        run: python -m unittest discover -s commercial/far-demo/tests -p "test_*.py"
      - name: Verify application import
        run: python -c "from far_demo.app import app; assert app.title == 'Project FAR Demo'"
