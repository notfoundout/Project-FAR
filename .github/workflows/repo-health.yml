name: Repository Health
on:
  pull_request: null
  push:
    branches:
    - main
jobs:
  repo-health:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        show-progress: false
    - name: Verify CRE-002 checksum lock
      run: python3 tools/check_cre002_lock.py
    - name: Verify CRE-002-EXT-001 checksum lock
      run: python3 tools/check_cre002_ext001_checksums.py
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run theory verifier
      run: python tools/verify_theory.py
    - name: Run canonical fast repository health check
      id: health
      continue-on-error: true
      shell: bash
      run: |
        set -o pipefail
        python tools/repo_health_check.py --fast 2>&1 | tee repository-health.log
    - name: Print repository health root-cause tail
      if: always() && steps.health.outcome == 'failure'
      run: tail -n 180 repository-health.log
    - name: Upload repository health log
      if: always() && steps.health.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: repository-health-failure-log
        path: repository-health.log
        if-no-files-found: error
        retention-days: 7
    - name: Enforce repository health result
      if: always() && steps.health.outcome == 'failure'
      run: exit 1
    timeout-minutes: 30
