name: Repository Health
on:
  pull_request: null
  push:
    branches:
    - main
jobs:
  repo-health:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Verify CRE-002 checksum lock
      run: python tools/check_cre002_lock.py
    - name: Run theory verifier
      run: python tools/verify_theory.py
    - name: Run canonical fast repository health check
      run: python tools/repo_health_check.py --fast
    timeout-minutes: 30
