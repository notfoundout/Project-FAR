name: Repository Health
on:
  pull_request: null
  push:
    branches:
    - main
jobs:
  repo-health:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        show-progress: false
    - name: Verify CRE-002 checksum lock
      run: python3 tools/check_cre002_lock.py
    - name: Verify CRE-002-EXT-001 checksum lock
      run: python3 tools/check_cre002_ext001_checksums.py
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run theory verifier
      run: python tools/verify_theory.py
    - name: Run canonical fast repository health check
      shell: bash
      run: |
        set +e
        python tools/repo_health_check.py --fast > /tmp/repo-health.log 2>&1
        status=$?
        tail -n 160 /tmp/repo-health.log
        exit $status
    timeout-minutes: 30
