name: Repository Health
on:
  pull_request: null
  push:
    branches:
    - main
jobs:
  repo-health:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run theory verifier
      shell: bash
      run: |
        set -o pipefail
        python tools/verify_theory.py 2>&1 | tee verify-theory.log
    - name: Run canonical fast repository health check
      shell: bash
      run: |
        set -o pipefail
        python tools/repo_health_check.py --fast 2>&1 | tee repository-health-fast.log
    - name: Upload fast health diagnostics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: repository-health-fast-logs
        path: |
          verify-theory.log
          repository-health-fast.log
    timeout-minutes: 30
