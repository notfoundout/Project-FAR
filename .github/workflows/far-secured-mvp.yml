name: FAR Secured MVP

on:
  pull_request:
    paths:
      - "commercial/far-decision-integrity/**"
      - ".github/workflows/far-secured-mvp.yml"
  workflow_dispatch:

jobs:
  secured-mvp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install ./commercial/far-decision-integrity
      - name: Run secured service tests
        run: python -m unittest discover -s commercial/far-decision-integrity/tests -p "test_secured_service.py"
      - name: Verify installed command
        run: far-secured-service --help
      - name: Build container
        run: docker build -t far-secured-mvp ./commercial/far-decision-integrity
      - name: Upload secured evidence staging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: far-secured-mvp-evidence
          path: far-evidence/secured-service
