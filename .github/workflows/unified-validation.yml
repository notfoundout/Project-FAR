name: Unified Validation Shadow

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap-and-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Verify independent bootstrap
        run: python validation_bootstrap/verify.py
      - name: Test unified validation engine
        run: python -m unittest discover -s tests -p "test_unified_validation.py" -v
      - name: Run unified fast profile without cache
        run: python -m far_validation validate --profile pr-fast --no-cache
      - name: Upload failure bundles
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unified-validation-failures
          path: .far
          if-no-files-found: ignore
          retention-days: 7

  full-shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run unified full PR profile
        run: python -m far_validation validate --profile pr-full --no-cache
      - name: Upload failure bundles
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unified-validation-full-failures
          path: .far
          if-no-files-found: ignore
          retention-days: 7
