name: Repository Health Tail Diagnostic
on:
  pull_request:
    branches: [main]
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Capture fast health output
        shell: bash
        run: |
          set +e
          python tools/repo_health_check.py --fast > /tmp/health.log 2>&1
          code=$?
          tail -200 /tmp/health.log
          exit $code
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repo-health-tail
          path: /tmp/health.log
