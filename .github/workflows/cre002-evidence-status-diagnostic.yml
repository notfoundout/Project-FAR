name: Finalize CRE-002 Evidence Integration
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: analyze-cre002-ext001-evidence
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Regenerate planning and repository index
        run: |
          python tools/self_advancement_plan.py
          git rm .github/workflows/cre002-evidence-status-diagnostic.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Finalize generated evidence status artifacts'
          git push origin HEAD:analyze-cre002-ext001-evidence
