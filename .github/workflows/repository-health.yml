name: Repository Health
on:
  workflow_dispatch: null
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Verify CRE-002-EXT-001 checksum lock
      run: python3 tools/check_cre002_ext001_checksums.py
    - uses: actions/setup-python@v5
      with:
        python-version: 3.x
    - name: Install dependencies
      run: python -m pip install pyyaml
    - name: Run full canonical repository health
      shell: bash
      run: |
        set -o pipefail
        python tools/repo_health_check.py --full 2>&1 | tee repository-health.log
    - name: Upload repository health diagnostics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: repository-health-diagnostics
        path: repository-health.log
        if-no-files-found: error
    timeout-minutes: 60
