name: Repository Health
on:
  workflow_dispatch: null
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: 3.x
    - name: Install dependencies
      run: python -m pip install pyyaml
    - name: Run full canonical repository health
      shell: bash
      run: |
        set -o pipefail
        python tools/repo_health_check.py --full 2>&1 | tee repository-health-full.log
    - name: Upload full health diagnostics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: repository-health-full-log
        path: repository-health-full.log
    timeout-minutes: 60
