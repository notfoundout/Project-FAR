name: Repository Health
on:
  workflow_dispatch: null
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Verify CRE-002-EXT-001 checksum lock
      run: python3 tools/check_cre002_ext001_checksums.py
    - uses: actions/setup-python@v5
      with:
        python-version: 3.x
    - name: Install dependencies
      run: python -m pip install pyyaml
    - name: Run full canonical repository health
      shell: bash
      run: |
        set +e
        python tools/repo_health_check.py --full > /tmp/project-far-full-health.log 2>&1
        rc=$?
        exit "$rc"
    - name: Upload full health diagnostics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: remaining-full-health-diagnostics
        path: /tmp/project-far-full-health.log
        if-no-files-found: error
    timeout-minutes: 60
