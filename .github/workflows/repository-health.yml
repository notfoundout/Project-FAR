name: Repository Health
on:
  workflow_dispatch: null
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: 3.x
    - name: Install dependencies
      run: python -m pip install pyyaml
    - name: Generate CRE-002 prospective evidence
      run: python tools/cre002_execute.py --write --check
    - name: Run full canonical repository health
      run: python tools/repo_health_check.py --full
    - name: Upload CRE-002 generated evidence
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cre002-generated-evidence
        path: |
          theory/evaluation/comparative-representation/experiments/CRE-002/execution
          docs/reports/cre002-prospective-comparison.md
    timeout-minutes: 60
