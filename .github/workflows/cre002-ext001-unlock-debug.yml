name: CRE-002-EXT-001 Unlock Debug
on:
  pull_request:
    branches: [main]
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependency
        run: python3 -m pip install pyyaml
      - name: Capture fast health failure tail
        shell: bash
        run: |
          set +e
          python3 tools/repo_health_check.py --fast > /tmp/health.log 2>&1
          code=$?
          tail -120 /tmp/health.log
          exit $code
