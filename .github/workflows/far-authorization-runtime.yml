name: FAR Authorization Runtime

on:
  pull_request:
    paths:
      - "commercial/far-decision-integrity/**"
      - ".github/workflows/far-authorization-runtime.yml"
  push:
    branches:
      - "commercial/**"
    paths:
      - "commercial/far-decision-integrity/**"
      - ".github/workflows/far-authorization-runtime.yml"

permissions:
  contents: read

jobs:
  authorization-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install FAR decision integrity
        run: python -m pip install --disable-pip-version-check ./commercial/far-decision-integrity
      - name: Run full decision integrity tests
        run: python -m unittest discover -s commercial/far-decision-integrity/tests -p "test_*.py" -v
      - name: Verify installed evidence-first authorization
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/refund.json" <<'JSON'
          {
            "request_id": "ci-refund-1",
            "order_id": "ci-order-1",
            "amount": 100,
            "order_exists": true,
            "payment_confirmed": false,
            "days_since_purchase": 5,
            "previous_refund": false,
            "agent_authorized": true
          }
          JSON
          set +e
          far-decision authorize-refund "$RUNNER_TEMP/refund.json" --output-directory "$RUNNER_TEMP/evidence"
          status=$?
          set -e
          test "$status" -eq 30
          test -f "$RUNNER_TEMP/evidence/decision-package.json"
          test -f "$RUNNER_TEMP/evidence/authorization.json"
          test -f "$RUNNER_TEMP/evidence/manifest.json"
      - name: Upload authorization evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: far-authorization-runtime-evidence
          path: ${{ runner.temp }}/evidence
          if-no-files-found: error
          retention-days: 7
