name: CRE-002-EXT-001 Checksum Capture
on:
  pull_request:
    branches:
      - main
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Capture exact frozen-file hashes
        shell: bash
        run: |
          set -euo pipefail
          base="https://raw.githubusercontent.com/notfoundout/Project-FAR/main/theory/evaluation/comparative-representation/experiments/CRE-002-EXT-001"
          for path in \
            README.md \
            preregistration.md \
            scenario/scenario-v1.0.json \
            ambiguity-policies.json \
            decision-rules.json \
            output-schema.json
          do
            tmp=$(mktemp)
            curl --fail --silent --show-error "$base/$path" -o "$tmp"
            hash=$(sha256sum "$tmp" | awk '{print $1}')
            bytes=$(wc -c < "$tmp" | tr -d ' ')
            printf '%s\t%s\t%s\n' "$path" "$hash" "$bytes"
            rm -f "$tmp"
          done
