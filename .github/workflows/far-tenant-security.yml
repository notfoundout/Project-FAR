name: FAR Tenant Security

on:
  pull_request:
    paths:
      - "commercial/far-decision-integrity/**"
      - ".github/workflows/far-tenant-security.yml"
  workflow_dispatch:

jobs:
  tenant-security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install ./commercial/far-decision-integrity
      - name: Run tenant security tests
        run: python -m unittest discover -s commercial/far-decision-integrity/tests -p "test_security.py"
