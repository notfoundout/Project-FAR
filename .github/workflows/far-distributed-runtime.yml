name: FAR Distributed Runtime

on:
  pull_request:
  workflow_dispatch:

jobs:
  distributed-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: python -m pip install ./commercial/far-decision-integrity
      - name: Run distributed runtime tests
        run: python -m unittest commercial/far-decision-integrity/tests/test_distributed.py
      - name: Validate deployment configuration
        run: |
          mkdir -p far-evidence/distributed-runtime
          far-distributed-runtime commercial/far-decision-integrity/deploy/distributed-runtime.json | tee far-evidence/distributed-runtime/config-validation.json
      - name: Validate Kubernetes manifest contract
        run: |
          grep -q 'replicas: 3' commercial/far-decision-integrity/deploy/kubernetes.yaml
          grep -q 'PodDisruptionBudget' commercial/far-decision-integrity/deploy/kubernetes.yaml
          grep -q 'readOnlyRootFilesystem: true' commercial/far-decision-integrity/deploy/kubernetes.yaml
      - name: Run full package tests
        run: python -m unittest discover -s commercial/far-decision-integrity/tests -p 'test_*.py'
      - uses: actions/upload-artifact@v4
        with:
          name: far-distributed-runtime-evidence
          path: far-evidence/distributed-runtime
