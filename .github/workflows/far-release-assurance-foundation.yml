name: FAR Release Assurance Foundation

on:
  pull_request:
    paths:
      - "commercial/far-release-assurance/**"
      - ".github/workflows/far-release-assurance-foundation.yml"
  push:
    branches:
      - "commercial/**"
    paths:
      - "commercial/far-release-assurance/**"
      - ".github/workflows/far-release-assurance-foundation.yml"

permissions:
  contents: read

jobs:
  foundation-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile commercial package
        run: python -m compileall -q commercial/far-release-assurance/src
      - name: Run deterministic foundation tests
        id: commercial-tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s commercial/far-release-assurance/tests -p "test_*.py" -v > commercial-test.log 2>&1
          status=$?
          tail -c 6000 commercial-test.log
          exit "$status"
      - name: Upload commercial test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: far-release-assurance-test-log
          path: commercial-test.log
          if-no-files-found: error
          retention-days: 7
