name: CRE-002-EXT-001 Diagnostic
on:
  pull_request:
    branches: [main]
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run focused CRE-002 checks
        shell: bash
        run: |
          set +e
          {
            python tools/check_cre002_ext001_preregistration.py
            python tools/cre002_ext001_execute.py --check
            python -m unittest discover -s tests -p '*cre002*.py'
          } > /tmp/cre002.log 2>&1
          code=$?
          cat /tmp/cre002.log
          exit $code
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cre002-ext001-diagnostic
          path: /tmp/cre002.log
