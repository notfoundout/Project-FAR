[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "far-decision-integrity"
version = "1.3.0"
description = "Machine-checkable decision integrity for Project FAR"
requires-python = ">=3.11"

[project.scripts]
far-decision = "far_decision_integrity.cli:main"
far-policy-impact = "far_decision_integrity.policy_cli:main"
far-reasoning-regression = "far_decision_integrity.regression_cli:main"
far-trace-ingest = "far_decision_integrity.trace_cli:main"
far-authorization-service = "far_decision_integrity.service_cli:main"
far-secured-service = "far_decision_integrity.secured_service_cli:main"
far-evidence-store = "far_decision_integrity.store_cli:main"
far-operations = "far_decision_integrity.operations_cli:main"

[tool.setuptools.packages.find]
where = ["src"]
