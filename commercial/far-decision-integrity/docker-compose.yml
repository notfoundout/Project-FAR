services:
  far:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - far-data:/var/lib/far
    read_only: true
    tmpfs:
      - /tmp/far:size=64m,mode=1770
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 30s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "far-operations", "--security-db", "/var/lib/far/security.db", "readiness", "--evidence-db", "/var/lib/far/evidence.db", "--blob-root", "/var/lib/far/blobs", "--staging-root", "/var/lib/far/staging"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  far-data:
